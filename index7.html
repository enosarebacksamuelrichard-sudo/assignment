<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>external css example</title>
    <style>
        .grid-container {
            display: grid;
            grid-template-columns:ifr ifr ifr; /* three equal column */
            grid-gap: 10px; /* 6ap between cells */
            padding: 10px;
        }
        .grid-item {
            background-color:lightgreen;
            padding: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="grid-container">
        <div class="grid-item">neymar</div>
        <div class="grid-item">messi</div>
        <div class="grid-item">mbappe</div>
        <div class="grid-item">ronaldo</div>
        <div class="grid-item">salah</div>   
        </div>
</body>
</html>
